<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paas Lingo - Hoofdscherm</title>
  <link rel="stylesheet" href="css/style.css?v=5">
  <style>
    .screen-flex { display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:2rem; }
    .screen-flex.hidden { display:none !important; }
  </style>
</head>
<body>

  <!-- FULLSCREEN BUTTON -->
  <button id="fullscreenBtn" onclick="toggleFullscreen()">Volledig Scherm</button>

  <!-- LOBBY -->
  <div id="lobbyScreen" class="center">
    <h1 class="logo" style="font-size:5rem">LINGO</h1>
    <p class="logo-sub">PAAS EDITIE</p>
    <div id="lobbyTeams" class="scoreboard" style="margin-top:2rem"></div>
    <p id="lobbyWait" style="margin-top:1.5rem;color:rgba(255,255,255,.6);font-size:1.2rem"></p>
    <div style="margin-top:2rem;padding:1rem 2rem;background:rgba(255,215,0,.1);border-radius:14px;border:2px dashed var(--yellow);display:inline-block">
      <p style="font-size:.75rem;color:rgba(255,255,255,.4)">SPELCODE</p>
      <p id="lobbyCode" style="font-size:2.5rem;font-weight:900;color:var(--yellow);letter-spacing:.3em"></p>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen-flex hidden">
    <div id="scoreboard" class="scoreboard"></div>
    <div id="timerDisplay" class="timer-display hidden"><span id="timerSeconds">30</span></div>
    <p id="turnIndicator" class="turn-text"></p>
    <div id="board" class="board"></div>
    <p id="roundInfo" style="margin-top:1rem;color:rgba(255,255,255,.3);font-size:.85rem"></p>
  </div>

  <!-- ROUND WON OVERLAY -->
  <div id="wonOverlay" class="overlay hidden">
    <p id="wonTitle" class="overlay-title"></p>
    <p class="overlay-title" style="font-size:2rem;margin-top:.5rem">Wint de ronde!</p>
    <div id="wonWord" class="word-reveal" style="margin-top:1.5rem"></div>
    <div id="wonScores" style="display:flex;gap:3rem;margin-top:2rem"></div>
  </div>

  <!-- ROUND OVER OVERLAY (niemand wint) -->
  <div id="overOverlay" class="overlay hidden">
    <p class="overlay-title" style="color:var(--red)">Niemand wint!</p>
    <p class="overlay-sub" style="margin-top:.5rem">Het woord was:</p>
    <div id="overWord" class="word-reveal failed" style="margin-top:1rem"></div>
    <div id="overScores" style="display:flex;gap:3rem;margin-top:2rem"></div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js?v=5"></script>
  <script src="js/game.js?v=5"></script>
  <script src="js/sounds.js?v=5"></script>

  <script>
    // ── Fullscreen ──
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }
    document.addEventListener("fullscreenchange", () => {
      document.body.classList.toggle("fullscreen-mode", !!document.fullscreenElement);
      document.getElementById("fullscreenBtn").textContent =
        document.fullscreenElement ? "Venster" : "Volledig Scherm";
    });

    // ── Get game ID ──
    const params = new URLSearchParams(window.location.search);
    const gameId = params.get("id");

    if (!gameId) {
      document.body.innerHTML = '<div class="center"><h1 class="logo logo-sm">LINGO</h1><p style="margin-top:1rem;color:var(--red)">Geen spelcode opgegeven.</p><a href="admin.html" style="margin-top:1.5rem;color:var(--yellow)">Ga naar Beheerder</a></div>';
      throw new Error("Geen gameId");
    }

    document.getElementById("lobbyCode").textContent = gameId;

    // ── State ──
    let boardData = createEmptyBoard(5);
    let prevStatus = "";
    let prevAttemptCount = 0;
    let prevTeam = -1;
    let animating = false;
    let timerInterval = null;
    let timerFired = false;

    function createEmptyBoard(rows) {
      return Array.from({length: rows || 5}, () => Array.from({length: 5}, () => ({letter: "", state: "empty"})));
    }

    function renderBoard(stealMode) {
      const boardEl = document.getElementById("board");
      if (!boardEl) return;
      boardEl.innerHTML = "";
      for (let r = 0; r < boardData.length; r++) {
        const rowEl = document.createElement("div");
        rowEl.className = "board-row";
        if (stealMode && r === boardData.length - 1) rowEl.classList.add("steal-row");
        rowEl.id = "row-" + r;
        for (let c = 0; c < 5; c++) {
          const tile = document.createElement("div");
          const d = boardData[r][c];
          tile.className = "tile tile-" + d.state;
          tile.textContent = d.letter;
          tile.id = "tile-" + r + "-" + c;
          rowEl.appendChild(tile);
        }
        boardEl.appendChild(rowEl);
      }
    }

    // ── Animate a row ──
    function animateRow(row, guess, result, callback) {
      if (row < 0 || row >= boardData.length) { if (callback) callback(); return; }
      animating = true;
      for (let c = 0; c < 5; c++) {
        boardData[row][c] = {letter: guess[c], state: "filled"};
      }
      renderBoard(row === 5);

      for (let c = 0; c < 5; c++) {
        setTimeout(() => {
          Sounds.flip();
          const tile = document.getElementById("tile-" + row + "-" + c);
          if (tile) {
            tile.classList.add("flip");
            setTimeout(() => {
              boardData[row][c] = {letter: guess[c], state: result[c]};
              tile.className = "tile tile-" + result[c];
              tile.textContent = guess[c];
            }, 250);
          }
        }, c * 400);
      }

      setTimeout(() => {
        animating = false;
        if (callback) callback();
      }, 5 * 400 + 300);
    }

    // ── Timer ──
    function startTimer(game) {
      stopTimer();
      if (!game.timerEnabled || !game.turnStartedAt) return;
      timerFired = false;
      const display = document.getElementById("timerDisplay");
      const seconds = document.getElementById("timerSeconds");
      display.classList.remove("hidden");

      timerInterval = setInterval(() => {
        const elapsed = (Date.now() - game.turnStartedAt) / 1000;
        const remaining = Math.max(0, Math.ceil((game.timerDuration || 30) - elapsed));
        seconds.textContent = remaining;

        if (remaining <= 5) {
          display.classList.add("urgent");
          if (remaining > 0) Sounds.tick();
        } else {
          display.classList.remove("urgent");
        }

        if (remaining <= 0 && !timerFired) {
          timerFired = true;
          stopTimer();
          // Beamer is de autoritatieve timeout-trigger
          Game.timeout(gameId, game.currentTeam);
        }
      }, 500);
    }

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      const display = document.getElementById("timerDisplay");
      display.classList.add("hidden");
      display.classList.remove("urgent");
    }

    // ── Listen ──
    Game.listen(gameId, (game) => {
      const teams = game.teams ? Object.values(game.teams) : [];

      // ── LOBBY ──
      if (game.status === "waiting") {
        document.getElementById("lobbyScreen").classList.remove("hidden");
        document.getElementById("gameScreen").classList.add("hidden");
        document.getElementById("wonOverlay").classList.add("hidden");
        document.getElementById("overOverlay").classList.add("hidden");
        stopTimer();

        let teamsHtml = "";
        teams.forEach((t) => {
          teamsHtml += '<div class="team-box"><span class="name">' + t.name + '</span><span class="points">' + t.score + '</span></div>';
        });
        document.getElementById("lobbyTeams").innerHTML = teamsHtml;
        document.getElementById("lobbyWait").textContent =
          teams.length < 2 ? "Wachten op teams... (" + teams.length + "/2)" : "Wachten op start...";

        prevStatus = "waiting";
        prevAttemptCount = 0;
        return;
      }

      // ── PLAYING ──
      if (game.status === "playing") {
        document.getElementById("lobbyScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.remove("hidden");
        document.getElementById("wonOverlay").classList.add("hidden");
        document.getElementById("overOverlay").classList.add("hidden");

        // Scoreboard
        let sbHtml = "";
        teams.forEach((t, i) => {
          const active = i === game.currentTeam ? "active" : "";
          sbHtml += '<div class="team-box ' + active + '"><span class="name">' + t.name + '</span><span class="points">' + t.score + '</span></div>';
        });
        document.getElementById("scoreboard").innerHTML = sbHtml;

        // Turn indicator
        const currentTeamName = teams[game.currentTeam] ? teams[game.currentTeam].name : "Team " + game.currentTeam;
        document.getElementById("turnIndicator").textContent = currentTeamName + " is aan de beurt";
        document.getElementById("turnIndicator").className = "turn-text";
        document.getElementById("roundInfo").textContent = game.round ? "Ronde " + game.round : "";

        const firstLetter = game.word ? game.word[0] : "";
        const attempts = game.attempts ? Object.values(game.attempts).sort((a,b) => a.row - b.row) : [];
        const newAttemptCount = attempts.length;

        // Nieuw bord bij status change of max-attempts reset
        if (prevStatus !== "playing" || (game.switchReason === "max-attempts" && prevTeam !== game.currentTeam && newAttemptCount === 0)) {
          boardData = createEmptyBoard(5);
          boardData[0][0] = {letter: firstLetter, state: "hint"};
          renderBoard(false);
          prevAttemptCount = 0;
          animating = false;
        }

        // Nieuwe poging animeren
        if (newAttemptCount > prevAttemptCount && !animating) {
          const latest = attempts[attempts.length - 1];
          boardData = createEmptyBoard(5);
          boardData[0][0] = {letter: firstLetter, state: "hint"};
          for (let i = 0; i < attempts.length - 1; i++) {
            const a = attempts[i];
            for (let c = 0; c < 5; c++) {
              boardData[a.row][c] = {letter: a.guess[c], state: a.result[c]};
            }
          }
          renderBoard(false);

          const isCorrect = latest.result.every(r => r === "correct");
          animateRow(latest.row, latest.guess, latest.result, () => {
            if (isCorrect) {
              Sounds.correct();
            } else {
              Sounds.incorrect();
              const rowEl = document.getElementById("row-" + latest.row);
              if (rowEl) { rowEl.classList.add("shake"); setTimeout(() => rowEl.classList.remove("shake"), 500); }
              if (latest.row + 1 < 5) {
                boardData[latest.row + 1][0] = {letter: firstLetter, state: "hint"};
                renderBoard(false);
              }
            }
          });
        } else if (newAttemptCount === prevAttemptCount && prevStatus === "playing") {
          if (prevTeam !== game.currentTeam && prevTeam !== -1) {
            Sounds.switchTurn();
          }
        } else if (prevAttemptCount === newAttemptCount && prevStatus !== "playing") {
          boardData = createEmptyBoard(5);
          boardData[0][0] = {letter: firstLetter, state: "hint"};
          for (const a of attempts) {
            for (let c = 0; c < 5; c++) {
              boardData[a.row][c] = {letter: a.guess[c], state: a.result[c]};
            }
          }
          if (game.currentRow > 0 && game.currentRow < 5) {
            boardData[game.currentRow][0] = {letter: firstLetter, state: "hint"};
          }
          renderBoard(false);
        }

        // Timer starten/herstarten bij beurtwisseling
        if (prevTeam !== game.currentTeam || prevStatus !== "playing") {
          startTimer(game);
        }

        prevStatus = "playing";
        prevAttemptCount = newAttemptCount;
        prevTeam = game.currentTeam;
        return;
      }

      // ── STEALING ──
      if (game.status === "stealing") {
        document.getElementById("lobbyScreen").classList.add("hidden");
        document.getElementById("gameScreen").classList.remove("hidden");
        document.getElementById("wonOverlay").classList.add("hidden");
        document.getElementById("overOverlay").classList.add("hidden");

        // Scoreboard
        let sbHtml = "";
        teams.forEach((t, i) => {
          const active = i === game.stealingTeam ? "active" : "";
          sbHtml += '<div class="team-box ' + active + '"><span class="name">' + t.name + '</span><span class="points">' + t.score + '</span></div>';
        });
        document.getElementById("scoreboard").innerHTML = sbHtml;

        // Steal indicator
        const stealTeamName = teams[game.stealingTeam] ? teams[game.stealingTeam].name : "Team";
        document.getElementById("turnIndicator").innerHTML = '<span class="steal-text">STELEN! ' + stealTeamName + ' mag stelen!</span>';
        document.getElementById("roundInfo").textContent = game.round ? "Ronde " + game.round : "";

        const firstLetter = game.word ? game.word[0] : "";
        const attempts = game.attempts ? Object.values(game.attempts).sort((a,b) => a.row - b.row) : [];
        const regularAttempts = attempts.filter(a => !a.isSteal);
        const stealAttempt = attempts.find(a => a.isSteal);

        // Bouw 6-rij bord: 5 bestaande + 1 steal-rij
        if (prevStatus !== "stealing") {
          boardData = createEmptyBoard(6);
          boardData[0][0] = {letter: firstLetter, state: "hint"};
          for (const a of regularAttempts) {
            for (let c = 0; c < 5; c++) {
              boardData[a.row][c] = {letter: a.guess[c], state: a.result[c]};
            }
          }
          // Hint in steal-rij
          boardData[5][0] = {letter: firstLetter, state: "hint"};
          renderBoard(true);
          prevAttemptCount = regularAttempts.length;
          animating = false;
        }

        // Animeer steel-poging
        if (stealAttempt && prevAttemptCount <= regularAttempts.length && !animating) {
          animateRow(5, stealAttempt.guess, stealAttempt.result, () => {
            const isCorrect = stealAttempt.result.every(r => r === "correct");
            if (isCorrect) Sounds.correct();
            else {
              Sounds.incorrect();
              const rowEl = document.getElementById("row-5");
              if (rowEl) { rowEl.classList.add("shake"); setTimeout(() => rowEl.classList.remove("shake"), 500); }
            }
          });
          prevAttemptCount = attempts.length;
        }

        // Timer voor steal
        if (prevStatus !== "stealing") {
          startTimer(game);
        }

        prevStatus = "stealing";
        prevTeam = game.currentTeam;
        return;
      }

      // ── ROUND WON ──
      if (game.status === "round-won") {
        stopTimer();
        if (prevStatus !== "round-won") {
          const attempts = game.attempts ? Object.values(game.attempts).sort((a,b) => a.row - b.row) : [];
          if (attempts.length > prevAttemptCount) {
            const latest = attempts[attempts.length - 1];
            animateRow(latest.row, latest.guess, latest.result, () => {
              Sounds.correct();
              showWonOverlay(game, teams);
            });
          } else {
            setTimeout(() => showWonOverlay(game, teams), 500);
          }
          prevAttemptCount = attempts.length;
        }
        prevStatus = "round-won";
        return;
      }

      // ── ROUND OVER (niemand wint) ──
      if (game.status === "round-over") {
        stopTimer();
        if (prevStatus !== "round-over") {
          const attempts = game.attempts ? Object.values(game.attempts).sort((a,b) => a.row - b.row) : [];
          const stealAttempt = attempts.find(a => a.isSteal);
          if (stealAttempt && attempts.length > prevAttemptCount) {
            animateRow(5, stealAttempt.guess, stealAttempt.result, () => {
              Sounds.incorrect();
              setTimeout(() => showOverOverlay(game, teams), 1500);
            });
          } else {
            setTimeout(() => showOverOverlay(game, teams), 500);
          }
          prevAttemptCount = attempts.length;
        }
        prevStatus = "round-over";
        return;
      }
    });

    function showWonOverlay(game, teams) {
      setTimeout(() => {
        document.getElementById("wonOverlay").classList.remove("hidden");
        const winner = teams[game.winningTeam];
        document.getElementById("wonTitle").textContent = winner ? winner.name : "Team";

        let wordHtml = "";
        if (game.word) {
          for (const ch of game.word) wordHtml += '<div class="letter">' + ch + '</div>';
        }
        document.getElementById("wonWord").innerHTML = wordHtml;

        let scoresHtml = "";
        teams.forEach(t => {
          scoresHtml += '<div style="text-align:center"><p style="opacity:.7;font-size:1.1rem">' + t.name + '</p><p style="font-size:3rem;font-weight:900;color:var(--yellow)">' + t.score + '</p></div>';
        });
        document.getElementById("wonScores").innerHTML = scoresHtml;

        fireConfetti();
        Sounds.victory();
      }, 2500);
    }

    function showOverOverlay(game, teams) {
      document.getElementById("overOverlay").classList.remove("hidden");

      let wordHtml = "";
      if (game.word) {
        for (const ch of game.word) wordHtml += '<div class="letter">' + ch + '</div>';
      }
      document.getElementById("overWord").innerHTML = wordHtml;

      let scoresHtml = "";
      teams.forEach(t => {
        scoresHtml += '<div style="text-align:center"><p style="opacity:.7;font-size:1.1rem">' + t.name + '</p><p style="font-size:3rem;font-weight:900;color:var(--yellow)">' + t.score + '</p></div>';
      });
      document.getElementById("overScores").innerHTML = scoresHtml;
    }

    // Initial render
    renderBoard(false);
  </script>
</body>
</html>
